<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Te Amo ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>

.splash-stage {
    position: fixed;
    inset: 0;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    z-index: 100;
    transition: opacity 1.2s ease, visibility 1.2s ease;
}

.splash-stage.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

.flower-stage {
    opacity: 0;
    visibility: hidden;
    transition: opacity 1.5s ease 0.4s, visibility 1.5s ease 0.4s;
}

.flower-stage.visible {
    opacity: 1;
    visibility: visible;
}

/* Splash styles (scoped) */
.splash-stage :root,
:root {
    --pink: #e8789a;
    --pink-light: #f4a7be;
    --pink-glow: rgba(232, 120, 154, 0.4);
    --dark: #0a0d12;
    --dark-2: #10151e;
    --cream: #fef0f4;
}

.splash-stage * { margin: 0; padding: 0; box-sizing: border-box; }

.splash-stage .stars { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.splash-stage .star {
    position: absolute; width: 2px; height: 2px;
    background: white; border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    opacity: 0;
}
@keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: var(--op, 0.8); transform: scale(1.4); }
}

.splash-stage .petals-container { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.splash-stage .petal {
    position: absolute; width: 10px; height: 14px;
    background: radial-gradient(ellipse at 40% 30%, #f9c8d8, #e8789a);
    border-radius: 50% 50% 50% 0;
    opacity: 0;
    animation: fall var(--fd, 8s) linear infinite var(--fdelay, 0s);
}
@keyframes fall {
    0% { transform: translateY(-20px) translateX(0) rotate(var(--rot, 0deg)); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.4; }
    100% { transform: translateY(110vh) translateX(var(--dx, 60px)) rotate(calc(var(--rot, 0deg) + 360deg)); opacity: 0; }
}

.splash-stage .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
.splash-stage .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(232,120,154,0.15), transparent 70%); top: -100px; right: -100px; animation: float1 8s ease-in-out infinite; }
.splash-stage .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(180,100,130,0.12), transparent 70%); bottom: -80px; left: -80px; animation: float2 10s ease-in-out infinite; }

@keyframes float1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 30px); } }
@keyframes float2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -20px); } }

.splash-stage .content {
    position: relative; z-index: 10; text-align: center; padding: 2rem;
    display: flex; flex-direction: column; align-items: center; gap: 2.5rem;
}

.splash-stage .deco-line { display: flex; align-items: center; gap: 1rem; opacity: 0; animation: fadeUp 1s ease forwards 0.3s; }
.splash-stage .deco-line span { display: block; height: 1px; width: 60px; background: linear-gradient(to right, transparent, var(--pink)); }
.splash-stage .deco-line span:last-child { background: linear-gradient(to left, transparent, var(--pink)); }

.splash-stage .heart-icon { color: var(--pink); font-size: 1.2rem; animation: heartbeat 1.5s ease-in-out infinite; }
@keyframes heartbeat { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.3); } 40% { transform: scale(1); } 60% { transform: scale(1.15); } }

.splash-stage .title-wrapper { opacity: 0; animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.6s; }
.splash-stage .subtitle {
    font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
    color: var(--pink-light); font-size: clamp(1rem, 2.5vw, 1.3rem);
    letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 0.6rem;
}
.splash-stage .main-title {
    font-family: 'Playfair Display', serif; font-weight: 700; font-style: italic;
    font-size: clamp(3rem, 9vw, 7rem); line-height: 1;
    color: transparent;
    background: linear-gradient(135deg, #fce4ec 0%, #f48fb1 30%, #e8789a 60%, #fce4ec 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; background-clip: text;
    animation: shimmer 4s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(232,120,154,0.5));
}
@keyframes shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
.splash-stage .title-bottom {
    font-family: 'Playfair Display', serif; font-weight: 400;
    font-size: clamp(2rem, 6vw, 4.5rem);
    color: transparent;
    background: linear-gradient(135deg, #fce4ec, #e8789a, #f48fb1);
    -webkit-background-clip: text; background-clip: text;
    margin-top: -0.2em;
    filter: drop-shadow(0 0 20px rgba(232,120,154,0.4));
}

.splash-stage .flower-deco { opacity: 0; animation: fadeUp 1s ease forwards 1s; }
.splash-stage .flower-deco svg { width: 80px; height: 80px; filter: drop-shadow(0 0 12px var(--pink-glow)); }

.splash-stage .btn-wrapper { opacity: 0; animation: fadeUp 1s ease forwards 1.4s; }
.splash-stage .btn {
    position: relative; display: inline-flex; align-items: center; gap: 0.8rem;
    padding: 1rem 3rem; font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; font-weight: 400; letter-spacing: 0.15em;
    color: var(--cream); text-decoration: none; background: transparent;
    border: 1px solid rgba(232,120,154,0.5); border-radius: 60px;
    cursor: pointer; overflow: hidden;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
.splash-stage .btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(232,120,154,0.2), rgba(244,167,190,0.15));
    opacity: 0; transition: opacity 0.4s ease;
}
.splash-stage .btn::after {
    content: ''; position: absolute; inset: -2px; border-radius: 60px;
    background: linear-gradient(135deg, var(--pink), transparent, var(--pink-light));
    opacity: 0; transition: opacity 0.4s ease; z-index: -1;
}
.splash-stage .btn:hover {
    color: #fff; border-color: var(--pink); transform: translateY(-3px);
    box-shadow: 0 10px 40px rgba(232,120,154,0.3), 0 0 20px rgba(232,120,154,0.15);
}
.splash-stage .btn:hover::before { opacity: 1; }
.splash-stage .btn:hover::after { opacity: 0.6; }
.splash-stage .btn:hover .btn-icon { transform: rotate(10deg) scale(1.2); }
.splash-stage .btn:active { transform: translateY(-1px); }
.splash-stage .btn-icon { font-size: 1.3rem; transition: transform 0.3s ease; }

.splash-stage .tagline {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
    color: rgba(244,167,190,0.5); font-size: 1rem; letter-spacing: 0.1em;
    opacity: 0; animation: fadeUp 1s ease forwards 1.8s;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
}

.splash-stage .corner { position: absolute; width: 80px; height: 80px; opacity: 0.3; }
.splash-stage .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--pink); border-left: 1px solid var(--pink); }
.splash-stage .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--pink); border-right: 1px solid var(--pink); }
.splash-stage .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--pink); border-left: 1px solid var(--pink); }
.splash-stage .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--pink); border-right: 1px solid var(--pink); }

/* Base */
html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
body { min-height: 100vh; }


/* ========== FLOWER GARDEN CSS ========== */
*,
*::after,
*::before {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

:root {
  --dark-color: #000;
}

.flower-stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  min-height: 100vh;
  background-color: var(--dark-color);
  overflow: hidden;
  perspective: 1000px;
  z-index: 1;
}

.night {
  position: fixed;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  filter: blur(0.1vmin);
  background-image: radial-gradient(
      ellipse at top,
      transparent 0%,
      var(--dark-color)
    ),
    radial-gradient(
      ellipse at bottom,
      var(--dark-color),
      rgba(145, 233, 255, 0.2)
    ),
    repeating-linear-gradient(
      220deg,
      rgb(0, 0, 0) 0px,
      rgb(0, 0, 0) 19px,
      transparent 19px,
      transparent 22px
    ),
    repeating-linear-gradient(
      189deg,
      rgb(0, 0, 0) 0px,
      rgb(0, 0, 0) 19px,
      transparent 19px,
      transparent 22px
    ),
    repeating-linear-gradient(
      148deg,
      rgb(0, 0, 0) 0px,
      rgb(0, 0, 0) 19px,
      transparent 19px,
      transparent 22px
    ),
    linear-gradient(90deg, rgb(0, 255, 250), rgb(240, 240, 240));
}

.flowers {
  position: relative;
  transform: scale(0.9);
}

.flower {
  position: absolute;
  bottom: 10vmin;
  transform-origin: bottom center;
  z-index: 10;
  --fl-speed: 0.8s;
}
.flower--1 {
  -webkit-animation: moving-flower-1 4s linear infinite;
  animation: moving-flower-1 4s linear infinite;
}
.flower--1 .flower__line {
  height: 70vmin;
  -webkit-animation-delay: 0.3s;
  animation-delay: 0.3s;
}
.flower--1 .flower__line__leaf--1 {
  -webkit-animation: blooming-leaf-right var(--fl-speed) 1.6s backwards;
  animation: blooming-leaf-right var(--fl-speed) 1.6s backwards;
}
.flower--1 .flower__line__leaf--2 {
  -webkit-animation: blooming-leaf-right var(--fl-speed) 1.4s backwards;
  animation: blooming-leaf-right var(--fl-speed) 1.4s backwards;
}
.flower--1 .flower__line__leaf--3 {
  -webkit-animation: blooming-leaf-left var(--fl-speed) 1.2s backwards;
  animation: blooming-leaf-left var(--fl-speed) 1.2s backwards;
}
.flower--1 .flower__line__leaf--4 {
  -webkit-animation: blooming-leaf-left var(--fl-speed) 1s backwards;
  animation: blooming-leaf-left var(--fl-speed) 1s backwards;
}
.flower--1 .flower__line__leaf--5 {
  -webkit-animation: blooming-leaf-right var(--fl-speed) 1.8s backwards;
  animation: blooming-leaf-right var(--fl-speed) 1.8s backwards;
}
.flower--1 .flower__line__leaf--6 {
  -webkit-animation: blooming-leaf-left var(--fl-speed) 2s backwards;
  animation: blooming-leaf-left var(--fl-speed) 2s backwards;
}
.flower--2 {
  left: 50%;
  transform: rotate(20deg);
  -webkit-animation: moving-flower-2 4s linear infinite;
  animation: moving-flower-2 4s linear infinite;
}
.flower--2 .flower__line {
  height: 60vmin;
  -webkit-animation-delay: 0.6s;
  animation-delay: 0.6s;
}
.flower--2 .flower__line__leaf--1 {
  -webkit-animation: blooming-leaf-right var(--fl-speed) 1.9s backwards;
  animation: blooming-leaf-right var(--fl-speed) 1.9s backwards;
}
.flower--2 .flower__line__leaf--2 {
  -webkit-animation: blooming-leaf-right var(--fl-speed) 1.7s backwards;
  animation: blooming-leaf-right var(--fl-speed) 1.7s backwards;
}
.flower--2 .flower__line__leaf--3 {
  -webkit-animation: blooming-leaf-left var(--fl-speed) 1.5s backwards;
  animation: blooming-leaf-left var(--fl-speed) 1.5s backwards;
}
.flower--2 .flower__line__leaf--4 {
  -webkit-animation: blooming-leaf-left var(--fl-speed) 1.3s backwards;
  animation: blooming-leaf-left var(--fl-speed) 1.3s backwards;
}
.flower--3 {
  left: 50%;
  transform: rotate(-15deg);
  -webkit-animation: moving-flower-3 4s linear infinite;
  animation: moving-flower-3 4s linear infinite;
}
.flower--3 .flower__line {
  -webkit-animation-delay: 0.9s;
  animation-delay: 0.9s;
}
.flower--3 .flower__line__leaf--1 {
  -webkit-animation: blooming-leaf-right var(--fl-speed) 2.5s backwards;
  animation: blooming-leaf-right var(--fl-speed) 2.5s backwards;
}
.flower--3 .flower__line__leaf--2 {
  -webkit-animation: blooming-leaf-right var(--fl-speed) 2.3s backwards;
  animation: blooming-leaf-right var(--fl-speed) 2.3s backwards;
}
.flower--3 .flower__line__leaf--3 {
  -webkit-animation: blooming-leaf-left var(--fl-speed) 2.1s backwards;
  animation: blooming-leaf-left var(--fl-speed) 2.1s backwards;
}
.flower--3 .flower__line__leaf--4 {
  -webkit-animation: blooming-leaf-left var(--fl-speed) 1.9s backwards;
  animation: blooming-leaf-left var(--fl-speed) 1.9s backwards;
}
.flower__leafs {
  position: relative;
  -webkit-animation: blooming-flower 2s backwards;
  animation: blooming-flower 2s backwards;
}
.flower__leafs--1 {
  -webkit-animation-delay: 1.1s;
  animation-delay: 1.1s;
}
.flower__leafs--2 {
  -webkit-animation-delay: 1.4s;
  animation-delay: 1.4s;
}
.flower__leafs--3 {
  -webkit-animation-delay: 1.7s;
  animation-delay: 1.7s;
}
.flower__leafs::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  transform: translate(-50%, -100%);
  width: 8vmin;
  height: 8vmin;
  background-color: #ffb3c8;
  filter: blur(10vmin);
}
.flower__leaf {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 8vmin;
  height: 11vmin;
  border-radius: 51% 49% 47% 53%/44% 45% 55% 69%;
  background-color: #f9c8d8;
  background-image: linear-gradient(to top, #e8789a, #f9c8d8);
  transform-origin: bottom center;
  opacity: 0.9;
  box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5);
}
.flower__leaf--1 {
  transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg);
}
.flower__leaf--2 {
  transform: translate(-50%, -4%) rotateX(40deg);
}
.flower__leaf--3 {
  transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg);
}
.flower__leaf--4 {
  width: 8vmin;
  height: 8vmin;
  transform-origin: bottom left;
  border-radius: 4vmin 10vmin 4vmin 4vmin;
  transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg);
  background-image: linear-gradient(to top, #d65878, #f9c8d8);
  z-index: 1;
  opacity: 0.8;
}
.flower__white-circle {
  position: absolute;
  left: -3.5vmin;
  top: -3vmin;
  width: 9vmin;
  height: 4vmin;
  border-radius: 50%;
  background-color: #fff;
}
.flower__white-circle::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 45%;
  transform: translate(-50%, -50%);
  width: 60%;
  height: 60%;
  border-radius: inherit;
  background-image: repeating-linear-gradient(
      135deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      45deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      67.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      135deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      45deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      112.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      112.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      45deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      22.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      45deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      22.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      135deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      157.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      67.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    repeating-linear-gradient(
      67.5deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 12px
    ),
    linear-gradient(90deg, rgb(255, 235, 18), rgb(255, 206, 0));
}
.flower__line {
  height: 55vmin;
  width: 1.5vmin;
  background-image: linear-gradient(
      to left,
      rgba(0, 0, 0, 0.2),
      transparent,
      rgba(255, 255, 255, 0.2)
    ),
    linear-gradient(to top, transparent 10%, #5a3a2e, #d65878);
  box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5);
  -webkit-animation: grow-flower-tree 4s backwards;
  animation: grow-flower-tree 4s backwards;
}
.flower__line__leaf {
  --w: 7vmin;
  --h: calc(var(--w) + 2vmin);
  position: absolute;
  top: 20%;
  left: 90%;
  width: var(--w);
  height: var(--h);
  border-top-right-radius: var(--h);
  border-bottom-left-radius: var(--h);
  background-image: linear-gradient(to top, rgba(122, 30, 60, 0.4), #d65878);
}
.flower__line__leaf--1 {
  transform: rotate(70deg) rotateY(30deg);
}
.flower__line__leaf--2 {
  top: 45%;
  transform: rotate(70deg) rotateY(30deg);
}
.flower__line__leaf--3,
.flower__line__leaf--4,
.flower__line__leaf--6 {
  border-top-right-radius: 0;
  border-bottom-left-radius: 0;
  border-top-left-radius: var(--h);
  border-bottom-right-radius: var(--h);
  left: -460%;
  top: 12%;
  transform: rotate(-70deg) rotateY(30deg);
}
.flower__line__leaf--4 {
  top: 40%;
}

.flower__line__leaf--5 {
  top: 0;
  transform-origin: left;
  transform: rotate(70deg) rotateY(30deg) scale(0.6);
}
.flower__line__leaf--6 {
  top: -2%;
  left: -450%;
  transform-origin: right;
  transform: rotate(-70deg) rotateY(30deg) scale(0.6);
}
.flower__light {
  position: absolute;
  bottom: 0vmin;
  width: 1vmin;
  height: 1vmin;
  background-color: rgb(255, 251, 0);
  border-radius: 50%;
  filter: blur(0.2vmin);
  -webkit-animation: light-ans 4s linear infinite backwards;
  animation: light-ans 4s linear infinite backwards;
}
.flower__light:nth-child(odd) {
  background-color: #ff80b8;
}
.flower__light--1 {
  left: -2vmin;
  -webkit-animation-delay: 1s;
  animation-delay: 1s;
}
.flower__light--2 {
  left: 3vmin;
  -webkit-animation-delay: 0.5s;
  animation-delay: 0.5s;
}
.flower__light--3 {
  left: -6vmin;
  -webkit-animation-delay: 0.3s;
  animation-delay: 0.3s;
}
.flower__light--4 {
  left: 6vmin;
  -webkit-animation-delay: 0.9s;
  animation-delay: 0.9s;
}
.flower__light--5 {
  left: -1vmin;
  -webkit-animation-delay: 1.5s;
  animation-delay: 1.5s;
}
.flower__light--6 {
  left: -4vmin;
  -webkit-animation-delay: 3s;
  animation-delay: 3s;
}
.flower__light--7 {
  left: 3vmin;
  -webkit-animation-delay: 2s;
  animation-delay: 2s;
}
.flower__light--8 {
  left: -6vmin;
  -webkit-animation-delay: 3.5s;
  animation-delay: 3.5s;
}
.flower__grass {
  --c: #159faa;
  --line-w: 1.5vmin;

        // Generate floating petals
        const petalsContainer = document.getElementById('petals');
        for (let i = 0; i < 18; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.cssText = `
                left: ${Math.random() * 100}%;
                top: -20px;
                --fd: ${6 + Math.random() * 8}s;
                --fdelay: ${Math.random() * 8}s;
                --dx: ${(Math.random() - 0.5) * 120}px;
                --rot: ${Math.random() * 360}deg;
                transform: rotate(${Math.random() * 360}deg);
            `;
            petalsContainer.appendChild(petal);
        }

        // Splash -> Garden transition
        const enterBtn = document.getElementById('enter-btn');
        const splash = document.getElementById('splash');
        const garden = document.getElementById('garden');

        enterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            splash.classList.add('hidden');
            // Reveal garden and start animations by removing .container
            garden.classList.add('visible');
            setTimeout(() => {
                garden.classList.remove('container');
            }, 300);
        });
    </script>
